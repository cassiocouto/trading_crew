# =============================================================================
# CrewAI Task Definitions
# =============================================================================
# Tasks are assigned to agents and executed in sequence within a crew.
# Each task has a description, expected output, and the agent responsible.
#
# For full documentation: https://docs.crewai.com/concepts/tasks
# =============================================================================

# ---------------------------------------------------------------------------
# Market Intelligence Tasks
# ---------------------------------------------------------------------------

fetch_market_data:
  description: >
    Fetch current ticker data and recent OHLCV candles for all configured
    trading pairs ({symbols}) from the exchange ({exchange_id}).
    Use the {timeframe} timeframe for candle data.
    Store all fetched data in the database for historical tracking.
  expected_output: >
    A structured collection of Ticker and OHLCV data for each configured
    symbol, including bid, ask, last price, volume, and recent candles.
  agent: sentinel

analyze_market:
  description: >
    Using the market data fetched by the Sentinel, compute technical
    indicators for each symbol: EMA(12), EMA(50), RSI(14), Bollinger
    Bands(20, 2), MACD(12, 26, 9), and ATR(14). Identify the current
    market regime (trending, ranging, volatile) for each pair.
  expected_output: >
    A MarketAnalysis object per symbol containing all computed indicator
    values, the identified market regime, and key support/resistance levels.
  agent: analyst
  context:
    - fetch_market_data

analyze_sentiment:
  description: >
    Gather sentiment data for the configured symbols. Check the Fear &
    Greed Index, trending topics, and any available news sentiment.
    Produce a sentiment score between -1 (extreme fear) and +1 (extreme greed).
  expected_output: >
    A sentiment score and qualitative assessment for each symbol, with
    sources cited.
  agent: sentiment

# ---------------------------------------------------------------------------
# Strategy Tasks
# ---------------------------------------------------------------------------

generate_signals:
  description: >
    Evaluate the market analysis and sentiment data to generate trade
    signals. Run all configured strategies (EMA Crossover, Bollinger Bands,
    RSI Range) against the analysis for each symbol. Produce a TradeSignal
    for each symbol with a confidence score based on strategy agreement.
    Only produce BUY or SELL signals when confidence exceeds the minimum
    threshold ({min_confidence}).
  expected_output: >
    A list of TradeSignal objects, each containing: symbol, signal type
    (buy/sell/hold), confidence score, suggested entry price, reason, and
    the originating strategy name.
  agent: strategist
  context:
    - analyze_market
    - analyze_sentiment

validate_risk:
  description: >
    For each actionable trade signal, validate against the portfolio's risk
    parameters: check position size limits ({max_position_size_pct}%),
    portfolio exposure ({max_portfolio_exposure_pct}%), and drawdown
    ({max_drawdown_pct}%). Calculate the appropriate position size using
    the risk-per-trade limit ({risk_per_trade_pct}%) and set a stop-loss
    at {default_stop_loss_pct}% below entry. Reject any signal that
    violates risk rules.
  expected_output: >
    A list of RiskCheckResult objects, one per signal. Each contains the
    verdict (approved/reduced/rejected), adjusted amount, stop-loss price,
    and reasons for any adjustments or rejections.
  agent: risk_manager
  context:
    - generate_signals

# ---------------------------------------------------------------------------
# Execution Tasks
# ---------------------------------------------------------------------------

execute_orders:
  description: >
    For each risk-approved signal, place the corresponding order on the
    exchange. In paper-trading mode, simulate the fill at the current
    market price. In live mode, place a limit order via the exchange API.
    Record all placed orders in the database.
  expected_output: >
    A list of Order objects with their exchange-assigned IDs and initial
    status (open or simulated-filled for paper mode).
  agent: executor
  context:
    - validate_risk

monitor_orders:
  description: >
    Check the status of all open orders. For filled orders, update the
    portfolio positions. For orders that have been open longer than
    {stale_order_cancel_minutes} minutes without filling, cancel them.
    Report any significant status changes.
  expected_output: >
    A summary of order status changes: newly filled orders, cancelled
    stale orders, and the updated portfolio state.
  agent: monitor
