# =============================================================================
# CrewAI Advisory Task Definitions
# =============================================================================
# Tasks for the advisory crew.  Each task receives a pre-formatted context
# string with the deterministic pipeline's output and returns structured
# adjustment directives.
#
# The {{context}} placeholder is replaced at runtime with the full pipeline
# summary (market analyses, signals, risk results, portfolio state,
# uncertainty factors).
#
# For full documentation: https://docs.crewai.com/concepts/tasks
# =============================================================================

review_trading_proposal:
  description: >
    You are reviewing the deterministic trading pipeline's proposal during
    a period of elevated market uncertainty.

    === PIPELINE OUTPUT ===
    {context}
    === END PIPELINE OUTPUT ===

    Analyze the proposal for:
    1. Signals that conflict with the current market regime or sentiment
    2. Unusually high confidence scores that may not reflect true conviction
    3. Cross-asset correlations or macro risks the rule-based system misses

    Return a JSON list of adjustment objects.  Each object must have:
    - "action": one of "veto_signal", "adjust_confidence", "tighten_stop_loss",
      "reduce_position_size", "sit_out"
    - "symbol": the affected trading pair (null for sit_out)
    - "reason": brief justification
    - "params": dict of action-specific values (e.g. {{"new_confidence": 0.4}},
      {{"stop_loss_pct": 0.02}})

    If the proposal looks sound, return an empty list [].
  expected_output: >
    A JSON list of advisory adjustment objects, or an empty list if no
    changes are recommended.
  agent: context_advisor

assess_risk_adjustments:
  description: >
    You are the final risk reviewer.  The Context Advisor has already
    proposed adjustments (or none).  Now evaluate the overall risk posture:

    === PIPELINE OUTPUT ===
    {context}
    === END PIPELINE OUTPUT ===

    Consider:
    1. Drawdown proximity — if the portfolio is near max drawdown, recommend
       tighter stops or a sit-out
    2. Concentration risk — if multiple signals target correlated assets
    3. Whether the Context Advisor's adjustments are sufficient

    Return a single JSON object with:
    - "adjustments": combined list of all recommended adjustments
    - "summary": one-paragraph summary of your reasoning
    - "uncertainty_score": the uncertainty score (pass through from context)
  expected_output: >
    A JSON object with keys "adjustments" (list), "summary" (string), and
    "uncertainty_score" (float).
  agent: risk_advisor
  context:
    - review_trading_proposal

interpret_sentiment:
  description: >
    Provide a brief qualitative interpretation of the current sentiment
    environment to inform the advisory review:

    === PIPELINE OUTPUT ===
    {context}
    === END PIPELINE OUTPUT ===

    Focus on:
    1. Whether the Fear & Greed reading reflects a genuine macro shift or noise
    2. Any recent news events that the numeric sentiment score may not capture
    3. Whether sentiment conditions support or contradict the proposed trades

    Keep your response concise (2-3 sentences).
  expected_output: >
    A brief narrative interpreting current market sentiment conditions.
  agent: sentiment_advisor
