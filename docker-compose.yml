# docker-compose.yml — trading-crew full-stack deployment
#
# Services
# --------
#   trading-bot  Python trading loop (paper mode by default)
#   api          FastAPI dashboard backend (port 8000)
#   dashboard    Next.js frontend (port 3000)
#
# Quick start (paper mode):
#   docker compose up --build
#
# Stopping:
#   docker compose down
#
# ---------------------------------------------------------------------------
# SQLite note (default)
# ---------------------------------------------------------------------------
# Both `trading-bot` and `api` mount the same local ./data directory so they
# share the SQLite database file via WAL mode (configured in Phase 7).
#
# IMPORTANT: the bind-mount must be on a local filesystem (ext4, APFS, overlay).
# NFS/CIFS-mounted volumes are NOT supported for SQLite — use the PostgreSQL
# alternative below for network storage or multi-host deployments.
#
# ---------------------------------------------------------------------------
# PostgreSQL alternative (commented out)
# ---------------------------------------------------------------------------
# Uncomment the `db` service and change `DATABASE_URL` on both `trading-bot`
# and `api` to switch to PostgreSQL.  Also remove the SQLite volume mounts.
#
#   db:
#     image: postgres:16-alpine
#     restart: unless-stopped
#     environment:
#       POSTGRES_DB: trading_crew
#       POSTGRES_USER: trader
#       POSTGRES_PASSWORD: changeme   # use a secrets manager in production
#     volumes:
#       - postgres_data:/var/lib/postgresql/data
#     healthcheck:
#       test: ["CMD-SHELL", "pg_isready -U trader -d trading_crew"]
#       interval: 10s
#       retries: 5
#
# Then on both `trading-bot` and `api`:
#   depends_on:
#     db:
#       condition: service_healthy
#   environment:
#     DATABASE_URL: postgresql+psycopg2://trader:changeme@db:5432/trading_crew
# ---------------------------------------------------------------------------

version: "3.9"

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-crew:latest
    restart: unless-stopped
    environment:
      TRADING_MODE: paper
      # SQLite bind-mount path inside the container (see volumes below).
      # Change to a postgresql+psycopg2://... URL when using the Postgres alternative.
      DATABASE_URL: sqlite:////app/data/trading.db
      LOG_LEVEL: INFO
    volumes:
      # Persist the SQLite database and share it with the api service.
      # See SQLite/PostgreSQL note above before deploying to non-local storage.
      - ./data:/app/data
      # Mount a .env file to supply exchange API keys and other secrets:
      # - ./.env:/app/.env:ro

  api:
    image: trading-crew:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    entrypoint: ["python", "scripts/dashboard.py"]
    environment:
      TRADING_MODE: paper
      DATABASE_URL: sqlite:////app/data/trading.db
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data
    depends_on:
      - trading-bot
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: trading-crew-dashboard:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

# Uncomment when using the PostgreSQL alternative above:
# volumes:
#   postgres_data:
