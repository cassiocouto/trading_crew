# =============================================================================
# Example: Paper Trading Configuration
# =============================================================================
# This is the safest way to start — no real orders, no risk.
# Copy this to .env values or use it as a reference.
# =============================================================================

# Paper trading mode (no real orders placed)
TRADING_MODE: paper

# Exchange to fetch price data from (still needs valid API for market data)
EXCHANGE_ID: binance
EXCHANGE_SANDBOX: true

# Symbols to track
SYMBOLS:
  - BTC/USDT
  - ETH/USDT

# Risk parameters (conservative defaults)
RISK:
  max_position_size_pct: 10      # Max 10% of portfolio in one position
  max_portfolio_exposure_pct: 50  # Max 50% of portfolio in positions
  max_drawdown_pct: 10            # Halt at 10% drawdown
  default_stop_loss_pct: 3        # 3% stop-loss
  risk_per_trade_pct: 1           # Risk 1% per trade

# Trading loop
LOOP_INTERVAL_SECONDS: 60
STALE_ORDER_CANCEL_MINUTES: 10

# Logging
LOG_LEVEL: DEBUG
