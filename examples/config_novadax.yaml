# =============================================================================
# Example: NovaDAX Configuration (BRL pairs)
# =============================================================================
# For users migrating from silvia_santas or silvia_v2.
# NovaDAX is a Brazilian exchange supporting BRL pairs.
# =============================================================================

TRADING_MODE: paper

EXCHANGE_ID: novadax
EXCHANGE_SANDBOX: false  # NovaDAX does not have a sandbox

# Credentials must be in .env
# EXCHANGE_API_KEY=...
# EXCHANGE_API_SECRET=...

SYMBOLS:
  - BTC/BRL
  - ETH/BRL

RISK:
  max_position_size_pct: 10
  max_portfolio_exposure_pct: 60
  max_drawdown_pct: 12
  default_stop_loss_pct: 3
  risk_per_trade_pct: 2

LOOP_INTERVAL_SECONDS: 60
STALE_ORDER_CANCEL_MINUTES: 10

LOG_LEVEL: INFO
