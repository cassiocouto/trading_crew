# =============================================================================
# Example: Binance Live Trading Configuration
# =============================================================================
# WARNING: This will place REAL orders. Use with caution.
# Read DISCLAIMER.md before enabling live trading.
# =============================================================================

TRADING_MODE: live

EXCHANGE_ID: binance
EXCHANGE_SANDBOX: false

# Credentials must be in .env (never in this file!)
# EXCHANGE_API_KEY=...
# EXCHANGE_API_SECRET=...

SYMBOLS:
  - BTC/USDT
  - ETH/USDT

RISK:
  max_position_size_pct: 5        # Conservative: max 5% per position
  max_portfolio_exposure_pct: 30  # Keep 70% in reserve
  max_drawdown_pct: 8             # Halt at 8% drawdown
  default_stop_loss_pct: 2.5
  risk_per_trade_pct: 1

LOOP_INTERVAL_SECONDS: 60
STALE_ORDER_CANCEL_MINUTES: 10

LOG_LEVEL: INFO
