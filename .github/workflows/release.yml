# release.yml — automated release workflow
#
# Triggered on version tags (e.g. v0.8.0).  Steps:
#   1. Run the full test suite (unit + integration).
#   2. Build the Python distribution (sdist + wheel).
#   3. Publish to PyPI via Trusted Publishers (OIDC — no token required).
#   4. Build and push Docker images to GitHub Container Registry.
#   5. Create a GitHub Release with auto-generated notes.
#
# Setup required (one-time, in repository settings):
#   • Add a PyPI Trusted Publisher for this repo/workflow.
#   • Ensure "packages: write" is granted for GHCR pushes.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write       # GitHub Release creation
  id-token: write       # OIDC token for PyPI Trusted Publisher
  packages: write       # Push to GitHub Container Registry

jobs:
  # --------------------------------------------------------------------------
  # 1. Run full test suite before releasing
  # --------------------------------------------------------------------------
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --all-extras
      - run: uv run pytest -m "not backtest" --tb=short

  # --------------------------------------------------------------------------
  # 2. Build and publish Python package
  # --------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/project/trading-crew/
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync --all-extras
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # --------------------------------------------------------------------------
  # 3. Build and push Docker images to GHCR
  # --------------------------------------------------------------------------
  publish-docker:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (backend)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Docker meta (dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-dashboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}

  # --------------------------------------------------------------------------
  # 4. Create GitHub Release with auto-generated notes
  # --------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, publish-docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for auto-generated release notes

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
